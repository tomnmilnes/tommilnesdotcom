<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Artwork — Tom Milnes</title>

  <!-- TOMMILNES.COM — ARTWORK PROJECT INDEX -->

  <style>
    @font-face {
      font-family: "VCR OSD Mono";
      src: url("assets/fonts/VCR-OSD-Mono.woff") format("woff");
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    :root {
      --blue: #0614d8;
      --green: #009b45;
      --ink: #070707;
      --paper: #f4f5ef;
      --panel: rgba(246, 247, 242, 0.88);
      --shadow: 6px 6px 0 rgba(0,0,0,0.18);
      --mono: "Courier New", Courier, monospace;
      --display: "VCR OSD Mono", "Courier New", monospace;
      --sans: Arial, Helvetica, sans-serif;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background-color: #f5f4ef;
      background-image:
        radial-gradient(circle at 18% 22%, rgba(131, 205, 158, 0.18), transparent 43%),
        radial-gradient(circle at 82% 18%, rgba(239, 174, 119, 0.16), transparent 41%),
        radial-gradient(circle at 70% 80%, rgba(188, 160, 220, 0.16), transparent 45%),
        radial-gradient(circle at 20% 82%, rgba(126, 181, 226, 0.17), transparent 43%);
      background-size: 160% 160%, 165% 165%, 170% 170%, 165% 165%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      animation: pageGradientDrift 42s ease-in-out infinite alternate;
      color: var(--ink);
      font-family: var(--mono);
    }

    @keyframes pageGradientDrift {
      0% { background-position: 8% 10%, 92% 8%, 78% 92%, 8% 88%; }
      50% { background-position: 20% 18%, 78% 22%, 66% 74%, 24% 70%; }
      100% { background-position: 14% 26%, 88% 14%, 74% 84%, 14% 76%; }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 62%, rgba(68, 55, 88, 0.05)),
        linear-gradient(90deg, rgba(74, 142, 126, 0.025), transparent 18%, transparent 82%, rgba(129, 91, 151, 0.03));
      z-index: 51;
    }

    a {
      color: var(--ink);
    }

    .menu {
      position: absolute;
      top: 32px;
      left: 32px;
      width: 205px;
      padding: 12px;
      background: var(--panel);
      border: 2px solid var(--blue);
      box-shadow: var(--shadow);
      z-index: 30;
    }

    .menu-title {
      font-size: 1rem;
      color: var(--ink);
      margin-bottom: 8px;
      border-bottom: 1px dotted var(--blue);
      padding-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }

    .menu-links {
      display: block;
    }

    .menu.collapsed .menu-links {
      display: none;
    }

    .menu a {
      display: block;
      margin: 8px 0;
      text-decoration: none;
      color: var(--ink);
    }

    .menu a:hover {
      color: var(--ink);
      transform: translateX(4px);
    }

    main {
      position: relative;
      z-index: 2;
      width: min(var(--max), calc(100vw - 56px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .project {
      margin-left: clamp(0px, 12vw, 140px);
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 14px;
      color: var(--ink);
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0;
      max-width: 50vw;
      color: var(--ink);
      font-size: clamp(1.6rem, 3.4vw, 3.4rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      text-shadow:
        2px 0 rgba(0,255,255,0.22),
        -2px 0 rgba(255,0,255,0.16);
    }

    .meta {
      text-align: right;
      color: var(--ink);
      line-height: 1.35;
    }

    .hero {
      margin: 0 0 16px;
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(0,0,0,0.32);
      padding: 8px;
      box-shadow: var(--shadow);
    }

    .hero img,
    .image-grid img {
      display: block;
      width: 100%;
      object-fit: cover;
      background:
        radial-gradient(circle, rgba(0,255,120,0.42), transparent 35%),
        repeating-linear-gradient(45deg, #111 0 2px, #333 2px 4px);
    }

    .hero img {
      aspect-ratio: 16 / 9;
      max-height: 78vh;
    }

    figcaption {
      margin-top: 7px;
      font-size: 0.72rem;
      line-height: 1.35;
      color: var(--ink);
      text-transform: uppercase;
    }

    .summary {
      max-width: 760px;
      margin: 18px 0 26px;
      padding: 12px 14px;
      background: rgba(246,247,242,0.74);
      border-left: 2px solid var(--blue);
      font-family: var(--mono);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin: 0 0 22px;
    }

    .image-grid figure {
      margin: 0;
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(0,0,0,0.26);
      padding: 8px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.12);
    }

    .image-grid img {
      aspect-ratio: 4 / 3;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .full-width img {
      aspect-ratio: 16 / 9;
    }

    .embed {
      margin: 0 0 22px;
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(0,0,0,0.26);
      padding: 8px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.12);
    }

    .embed-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      overflow: hidden;
    }

    .embed-frame iframe,
    .embed-frame video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .notes {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 24px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px dotted rgba(6,20,216,0.65);
    }

    .notes h2 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .notes p,
    .notes li {
      font-family: var(--mono);
      font-size: 0.96rem;
      line-height: 1.55;
    }

    .details {
      color: var(--ink);
      font-size: 0.74rem;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .details dl {
      margin: 0;
    }

    .details dt {
      color: var(--ink);
      margin-top: 10px;
    }

    .details dd {
      margin: 2px 0 0;
    }

    .links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .button {
      display: inline-block;
      border: 1px solid var(--blue);
      padding: 7px 8px;
      background: rgba(255,255,255,0.62);
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    .button:hover {
      background: var(--blue);
      color: #fff;
    }
    .listing-intro {
      max-width: 760px;
      margin: 18px 0 26px;
      padding: 12px 14px;
      background: rgba(246,247,242,0.74);
      border-left: 2px solid var(--blue);
      font-family: var(--mono);
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .project-card {
      min-width: 0;
      margin: 0;
    }

    .project-card a {
      display: block;
      color: var(--ink);
      text-decoration: none;
    }

    .project-card img,
    .project-placeholder-image {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      object-position: center top;
      border: 1px solid rgba(0,0,0,0.32);
      background: #111;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.14);
    }

    .project-card a:hover img {
      outline: 2px solid var(--blue);
      outline-offset: -2px;
    }

    .project-card figcaption {
      margin: 8px 0 0;
      padding: 8px 10px;
      border-left: 2px solid var(--blue);
      background: rgba(246,247,242,0.74);
      font-family: var(--display);
      font-weight: 400;
      font-size: 0.82rem;
    }

    .project-placeholder-image {
      display: grid;
      place-items: center;
      border: 2px dashed var(--blue);
      background: rgba(246,247,242,0.5);
      color: var(--ink);
      text-align: top;
      text-transform: uppercase;
    }

    .project-placeholder-image span {
      max-width: 18ch;
    }


    .menu {
      border-color: var(--ink);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 1rem;
      line-height: 1.25;
    }

    h1,
    figcaption,
    .lightbox-caption,
    .notes h2,
    .research-copy h2,
    .section > h2,
    .panel h3,
    .contact-copy h3,
    .contact-form h3 {
      color: var(--ink);
      font-family: var(--display);
      font-weight: 400;
    }

    h1 {
      max-width: 50vw;
      font-size: clamp(1.6rem, 3.4vw, 3.4rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .menu-title,
    .menu a,
    .menu a:hover {
      color: var(--ink);
    }

    .menu-title {
      border-bottom-color: var(--ink);
    }

    @media (max-width: 900px) {
      .menu {
        top: 16px;
        left: 16px;
        width: 210px;
      }

      main {
        width: calc(100vw - 32px);
        padding-top: 230px;
      }

      .project {
        margin-left: 0;
      }

      .topline {
        display: block;
      }

      h1 {
        max-width: none;
        margin-bottom: 8px;
      }

      .meta {
        text-align: left;
      }

      .image-grid,
      .project-grid,
      .notes {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: auto;
      }
    }
  </style>
</head>
